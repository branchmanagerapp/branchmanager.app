# Supabase project config — pinned so every `supabase functions deploy`
# run picks up the right per-function flags without depending on the
# operator remembering CLI args.
#
# History:
#   May 2 2026 — created after dialpad-webhook was silently broken for ~14
#   hours when two redeploys forgot the --no-verify-jwt flag. The function
#   was returning 401 to every inbound Dialpad webhook (SMS + calls), so
#   leads piled up at Dialpad's end and got dropped. Pinning verify_jwt
#   per-function below so the flag is config-driven, not CLI-driven.

project_id = "ltpivkqahvplapyagljt"

# ── Edge Functions ────────────────────────────────────────────────────────
# Functions that receive webhooks from external services (Dialpad, Stripe,
# Resend, Bouncie) MUST set verify_jwt = false so the external POST isn't
# rejected for not having a Supabase JWT. Each function then verifies its
# own signature (HMAC) against a per-vendor secret.

[functions.dialpad-webhook]
verify_jwt = false

[functions.bouncie-webhook]
verify_jwt = false

# OAuth redirect target — browsers hit this directly with no Supabase JWT.
[functions.bouncie-oauth-callback]
verify_jwt = false

# Cron-triggered (pg_cron net.http_post) — same pattern as marketing-automation.
# Function is read-only (pulls positions from Bouncie API, inserts to
# vehicle_positions) and has no spam vector, so safe to expose without JWT.
[functions.bouncie-rest-sync]
verify_jwt = false

# BM Receptionist — Twilio voice webhook. Twilio posts form-encoded
# data without a Supabase JWT. Function verifies the request internally
# via TWILIO_AUTH_TOKEN signature when configured.
[functions.bm-receptionist]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.resend-webhook]
verify_jwt = false

# Public-facing endpoints that anon users hit directly (book a request from
# peekskilltree.com, approve a quote, etc.) also can't carry a Supabase JWT.

[functions.request-notify]
verify_jwt = false

[functions.quote-notify]
verify_jwt = false

[functions.quote-update]
verify_jwt = false

[functions.invoice-fetch]
verify_jwt = false

[functions.quote-fetch]
verify_jwt = false

[functions.portal-auth]
verify_jwt = false

[functions.portal-session]
verify_jwt = false

[functions.portal-update]
verify_jwt = false

# Portal "Pay All Outstanding" — combined Stripe Checkout across every
# unpaid invoice for the logged-in customer. Auths via custom session
# token, not Supabase JWT.
[functions.portal-pay-all]
verify_jwt = false

# Public marketing-site renderer — anyone hitting clients.branchmanager.app
# /{slug}/llm-info/ (or any other generated page) should reach this without
# a JWT. The function only reads tenants.config (no writes), so opening it
# to anon traffic is safe.
[functions.render-marketing-site]
verify_jwt = false

# v671: send-email pinned verify_jwt = false. The BM browser bundle calls
# send-email without an Authorization header (relies on the public
# RESEND_API_KEY secret server-side + tenant-id resolution). Was working
# fine until a deploy re-enabled JWT — pinning here so it stays correct.
[functions.send-email]
verify_jwt = false

# v675: BM SaaS subscription checkout — called from the browser when a
# tenant clicks Upgrade in Settings. Same browser-bundle pattern as
# send-email; security is enforced by Stripe (signed session URL).
[functions.subscription-create-checkout]
verify_jwt = false

# v691: Plaid bank-connection edge functions. Both the Link-token
# create and the public_token exchange are called from the browser
# (Plaid Link runs client-side, hands the public_token to BM, which
# POSTs it through plaid-exchange-token). The webhook receives Plaid's
# server-to-server POSTs. Sync function is called both by webhook and
# by browser/cron. All four bypass JWT for these reasons.
[functions.plaid-link-token]
verify_jwt = false

[functions.plaid-exchange-token]
verify_jwt = false

[functions.plaid-webhook]
verify_jwt = false

[functions.plaid-sync-transactions]
verify_jwt = false

# Internal functions that BM (with anon key) calls from authenticated
# context — these CAN keep verify_jwt = true (default) since the BM
# bundle stamps the anon key. Listed here for clarity:
#
#   ai-chat, send-email, transition-blast, sendjim-send,
#   stripe-charge, stripe-create-link, save-stripe-secret,
#   marketing-automation (cron-triggered), dialpad-sms-send
