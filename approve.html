<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote / Estimate Approval</title>
  <style>
    /* v635: Jobber-style customer approve page —
       cleaner whitespace, subtle top accent (no heavy header bar),
       2-card meta layout, sticky bottom CTAs, generous padding.
       JS untouched — every element id and class name preserved. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f6f7f9; color: #0f172a; min-height: 100vh; padding-bottom: 24px; }
    .page { max-width: 760px; margin: 0 auto; padding: 22px 18px; }

    /* ── Document card — subtle colored top accent (Jobber pattern) ── */
    .doc-card { background: #fff; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.05); overflow: hidden; margin-bottom: 18px; }
    .doc-accent { height: 4px; background: #1a3c12; }
    .doc-pad { padding: 28px 28px 22px; }

    /* ── Header — status pill + brand ── */
    .header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .header-brand { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: #1a3c12; }
    .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -.5px; margin-top: 6px; color: #0f172a; }
    .header-status { display: flex; align-items: center; gap: 8px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; letter-spacing: .02em; }
    .badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .badge-sent { background: #fff8e6; color: #b45309; }
    .badge-approved { background: #e8f5e9; color: #166534; }
    .badge-declined { background: #fef2f2; color: #b91c1c; }

    /* ── 2-card meta row — client info / quote meta ── */
    .meta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 18px 0 24px; }
    .meta-card { background: #fafbfc; border: 1px solid #eef0f3; border-radius: 12px; padding: 16px 18px; }
    .meta-row-rows { display: flex; flex-direction: column; gap: 10px; }
    .meta-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }
    .meta-val { font-size: 14px; font-weight: 500; color: #0f172a; margin-top: 2px; }
    .meta-val-big { font-size: 22px; font-weight: 800; color: #1a3c12; letter-spacing: -.4px; }

    /* legacy alias kept for old code paths */
    .card { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,.05); margin-bottom: 16px; }
    .card-standalone { border-radius: 14px; }

    .section-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .07em; font-weight: 600; margin-bottom: 8px; }
    .desc-box { background: #f8faf8; border-left: 3px solid #1a3c12; border-radius: 0 10px 10px 0; padding: 14px 18px; margin-bottom: 22px; font-size: 14px; line-height: 1.65; color: #1f2937; }

    /* ── Line items table ── */
    .line-table { width: 100%; border-collapse: collapse; margin: 8px 0 4px; }
    .line-table th { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; padding: 10px 0; border-bottom: 1px solid #eef0f3; text-align: left; letter-spacing: .04em; }
    .line-table th:last-child, .line-table th:nth-child(3), .line-table th:nth-child(4) { text-align: right; }
    .line-table td { padding: 14px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; vertical-align: top; }
    .line-table td:last-child, .line-table td:nth-child(3), .line-table td:nth-child(4) { text-align: right; }
    .line-table tfoot td { padding: 8px 0; border: none; }
    .line-table .total-row td { font-weight: 800; font-size: 18px; border-top: 1px solid #eef0f3; padding-top: 14px; color: #0f172a; }

    /* ── Buttons ── */
    .actions { margin-top: 26px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px 24px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; margin-bottom: 12px; transition: all .15s; line-height: 1; }
    .btn:active { transform: scale(.99); }
    .btn-approve { background: #1a3c12; color: #fff; }
    .btn-approve:hover { background: #245219; }
    .btn-changes { background: #fff; color: #1a3c12; border: 1px solid #d1d5db; }
    .btn-changes:hover { background: #f5f7f3; border-color: #1a3c12; }
    .btn-disabled { background: #e5e7eb; color: #94a3b8; cursor: default; }
    .btn-decline { background: #fff; color: #b32d2d; border: 1px solid #fca5a5; }
    .btn-decline:hover { background: #fef2f2; }

    /* ── Sticky bottom CTA bar (mobile + desktop, always visible) ── */
    .sticky-cta { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,.95); backdrop-filter: saturate(180%) blur(12px); -webkit-backdrop-filter: saturate(180%) blur(12px); border-top: 1px solid #e5e7eb; box-shadow: 0 -4px 16px rgba(0,0,0,.04); padding: 12px 16px; z-index: 50; }
    .sticky-cta-inner { max-width: 760px; margin: 0 auto; display: flex; gap: 8px; align-items: center; }
    .sticky-cta .btn { margin-bottom: 0; padding: 14px 22px; }
    .sticky-cta-primary { flex: 1; }
    .sticky-cta-secondary { flex: 0 0 auto; padding: 14px 18px !important; }

    /* Forms / textareas */
    .changes-form { display: none; margin-top: 8px; padding: 16px; background: #f6f7f9; border-radius: 10px; }
    textarea { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; font-family: inherit; resize: vertical; line-height: 1.5; }
    textarea:focus { outline: none; border-color: #1a3c12; box-shadow: 0 0 0 3px rgba(26,60,18,.1); }

    /* Success / loader / error */
    .success-card { text-align: center; padding: 48px 24px; }
    .success-icon { font-size: 56px; margin-bottom: 16px; }
    .success-card h2 { font-size: 26px; color: #1a3c12; margin-bottom: 10px; font-weight: 800; }
    .success-card p { color: #475569; font-size: 15px; line-height: 1.7; max-width: 380px; margin: 0 auto; }
    .footer { text-align: center; font-size: 12px; color: #94a3b8; padding: 14px 0 28px; }
    .footer a { color: #1a3c12; text-decoration: none; font-weight: 600; }
    .loader { text-align: center; padding: 100px 20px; }
    .loader .icon { font-size: 48px; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .error-card { text-align: center; padding: 48px 20px; }
    .already-approved { background: #e8f5e9; border-radius: 12px; padding: 20px; text-align: center; margin-top: 20px; border: 1px solid #a5d6a7; }

    /* Signature pad */
    .sig-canvas {
      width: 100%; height: 150px; border: 1px solid #d1d5db; border-radius: 10px;
      background: #fff; touch-action: none; cursor: crosshair; display: block;
    }
    .sig-section { display: none; margin-top: 18px; border-top: 1px solid #eef0f3; padding-top: 18px; }
    .sig-clear { background: none; border: none; color: #64748b; font-size: 12px; cursor: pointer; margin-top: 4px; text-decoration: underline; }
    .sig-legal { font-size: 11px; color: #64748b; margin-top: 10px; line-height: 1.5; }
    .sig-toggle { background: none; border: none; color: #1a3c12; font-size: 12px; cursor: pointer; text-decoration: underline; padding: 4px 0; margin-bottom: 6px; font-weight: 600; }
    .sig-typed-input {
      width: 100%; height: 80px; border: 1px solid #d1d5db; border-radius: 10px;
      background: #fff; padding: 12px 16px; font-size: 38px; line-height: 1.2;
      font-family: 'Brush Script MT', 'Lucida Handwriting', cursive; color: #1a3c12;
      display: block;
    }
    .sig-typed-input:focus { outline: none; border-color: #1a3c12; box-shadow: 0 0 0 3px rgba(26,60,18,.1); }

    /* HIC legal disclosures */
    .hic-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; margin-top: 22px; font-size: 11px; line-height: 1.6; color: #475569; }
    .hic-box p { margin: 0 0 8px; }
    .hic-box p:last-child { margin-bottom: 0; }
    .hic-box strong { color: #0f172a; }

    /* Photos */
    .li-photos { display: grid; grid-template-columns: repeat(auto-fill, 64px); gap: 6px; margin-top: 8px; }
    .li-photos a { display: block; width: 64px; height: 64px; border-radius: 10px; overflow: hidden; }
    .li-photos img { width: 64px; height: 64px; object-fit: cover; display: block; border: 1px solid #e5e7eb; border-radius: 10px; }

    /* Mobile */
    @media (max-width: 600px) {
      .page { padding: 14px 12px; }
      .doc-pad { padding: 20px 18px 18px; }
      .header h1 { font-size: 22px; }
      .meta-row { grid-template-columns: 1fr; gap: 10px; }
      .line-table th:nth-child(3), .line-table td:nth-child(3) { display: none; }
      .sticky-cta { padding: 10px 12px; }
      .sticky-cta .btn { padding: 14px 14px; font-size: 14px; }
    }
  </style>
  <script src="branding.js"></script>
</head>
<body>
  <div class="page">
    <div id="app">
      <div class="loader">
        <div class="icon">🌳</div>
        <div style="color:#666;font-size:15px;">Loading your quote...</div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
<script src="tenant-slug-bootstrap.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" integrity="sha384-GFr3yTh5lJznCbZfpTtXnwboFsxqtTQoeTZCRHhE0579KrRmlCzen5AA8ohaB5ug" crossorigin="anonymous"></script>
  <script>
    var SUPABASE_URL = 'https://ltpivkqahvplapyagljt.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cGl2a3FhaHZwbGFweWFnbGp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTgxNzIsImV4cCI6MjA4OTY3NDE3Mn0.bQ-wAx4Uu-FyA2ZwsTVfFoU2ZPbeWCmupqV-6ZR9uFI';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var params = new URLSearchParams(window.location.search);
    var quoteId  = params.get('id');
    var urlToken = params.get('token');
    var noSig    = params.get('nosig') === '1';          // signature not required
    var tcUrl    = params.get('tc') || '';               // T&C URL
    var docTerm  = params.get('term') === 'estimate' ? 'Estimate' : 'Quote';  // "Quote" or "Estimate"

    function el(id) { return document.getElementById(id); }
    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function money(n) { return '$' + (+(n||0)).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }
    function dateShort(d) { if (!d) return '—'; var dt = new Date(d); return (dt.getMonth()+1) + '/' + dt.getDate() + '/' + dt.getFullYear(); }

    // RLS gateway — was: direct anon SELECT exposed every quote in the DB to any
    // anon-key holder. Now: POST {id, token} to quote-fetch edge fn which does
    // service-role lookup + token compare + strips the token from the response.
    var FN_BASE = SUPABASE_URL + '/functions/v1';
    async function loadQuote() {
      if (!quoteId || !urlToken) { showError('Invalid link — please check your email for the correct link.'); return; }
      try {
        var r = await fetch(FN_BASE + '/quote-fetch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: quoteId, token: urlToken })
        });
        var data = await r.json();
        if (!r.ok || !data || !data.ok || !data.quote) {
          showError(((data && data.error) || 'Quote not found') + '. The link may be expired or incorrect.<br><br>Please contact us and we\'ll resend it.');
          return;
        }
        renderQuote(data.quote);
      } catch(e) {
        showError('Network error loading quote. Please contact us if this persists.');
      }
    }

    function renderQuote(q) {
      var isApproved = q.status === 'approved' || q.status === 'converted';
      var isDeclined = q.status === 'declined';

      var statusBadge = isApproved
        ? '<span class="badge badge-approved">✓ Approved</span>'
        : isDeclined
          ? '<span class="badge badge-declined">Declined</span>'
          : '<span class="badge badge-sent">Awaiting Your Response</span>';

      // Line items — v588+ each row gets a checkbox so the customer can
      // opt-in/opt-out of individual services. Total recalculates live.
      // If quote has only 1 line item, hide the checkbox (no-op for them).
      var items = q.line_items || [];
      var lineRows = '';
      var allowSelection = items.length > 1 && !isApproved && !isDeclined;
      if (items.length) {
        items.forEach(function(item, idx) {
          var amt = item.amount || ((item.qty || 1) * (item.rate || 0));
          var photosHtml = '';
          if (Array.isArray(item.photos) && item.photos.length) {
            var thumbs = item.photos.slice(0, 3).map(function(url) {
              var safe = esc(url);
              return '<a href="' + safe + '" target="_blank" rel="noopener"><img src="' + safe + '" alt="line item photo" loading="lazy"></a>';
            }).join('');
            photosHtml = '<div class="li-photos">' + thumbs + '</div>';
          }
          var checkboxCell = allowSelection
            ? '<td style="width:32px;text-align:center;"><input type="checkbox" class="li-pick" data-idx="' + idx + '" data-amt="' + Number(amt).toFixed(2) + '" checked onchange="recalcSelected()" style="width:18px;height:18px;cursor:pointer;accent-color:#1a3c12;"></td>'
            : '';
          lineRows += '<tr data-li-row="' + idx + '">'
            + checkboxCell
            + '<td style="font-weight:600;">' + esc(item.service || 'Service') + '</td>'
            + '<td style="color:#666;font-size:13px;">' + esc(item.description || '') + photosHtml + '</td>'
            + '<td>' + (item.qty || 1) + '</td>'
            + '<td>' + money(item.rate) + '</td>'
            + '<td><strong class="li-amt">' + money(amt) + '</strong></td>'
            + '</tr>';
        });
      } else {
        lineRows = '<tr><td colspan="' + (allowSelection ? 6 : 5) + '" style="color:#999;font-size:13px;padding:16px 0;">See description above for scope of work.</td></tr>';
      }
      window._allowSelection = allowSelection;
      // Banner above table when selection is enabled
      if (allowSelection) {
        var pickHelpHtml = '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#92400e;">'
          + '☑️ Tap to opt out of any line item you don\'t want — the total below updates as you select.'
          + '</div>';
        window._pickHelpHtml = pickHelpHtml;
      } else {
        window._pickHelpHtml = '';
      }

      // Expiry
      var expiryHtml = '';
      if (q.expires_at) {
        var expDate = new Date(q.expires_at);
        var daysLeft = Math.ceil((expDate - new Date()) / 86400000);
        if (daysLeft < 0) {
          expiryHtml = '<div style="background:#ffebee;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#c62828;font-weight:600;">⚠️ This quote expired on ' + dateShort(q.expires_at) + '. Please contact us for a fresh quote.</div>';
          isDeclined = true; // prevent approval of expired quotes
        } else if (daysLeft <= 7) {
          expiryHtml = '<div style="background:#fff3e0;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#e07c24;font-weight:600;">⏳ This quote expires in ' + daysLeft + ' day' + (daysLeft !== 1 ? 's' : '') + ' (' + dateShort(q.expires_at) + ')</div>';
        }
      }

      // Deposit notice
      var depositHtml = '';
      if (q.deposit_required && !q.deposit_paid) {
        var depDue = q.deposit_due || 0;
        depositHtml = '<div style="background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:14px;margin-top:16px;">'
          + '<div style="font-weight:700;font-size:14px;color:#1a3c12;margin-bottom:4px;">💳 Deposit Required</div>'
          + '<div style="font-size:13px;color:#333;margin-bottom:10px;">A deposit of <strong>' + money(depDue) + '</strong> is required to confirm this quote and schedule your service.</div>'
          + '<a href="pay.html?type=deposit&id=' + esc(q.id) + '" class="btn btn-approve" style="text-decoration:none;display:flex;justify-content:center;">Pay Deposit ' + money(depDue) + ' to Approve</a>'
          + '</div>';
      }

      // Action buttons
      var actionHtml = '';
      if (isApproved) {
        actionHtml = '<div class="already-approved">'
          + '<div style="font-size:24px;margin-bottom:6px;">✅</div>'
          + '<div style="font-weight:700;color:#2e7d32;font-size:16px;">' + docTerm + ' Approved</div>'
          + '<div style="font-size:13px;color:#666;margin-top:4px;">We\'ll be in touch to schedule your service.</div>'
          + '</div>'
          + '<div id="portal-cta" style="margin-top:16px;padding:18px;background:#f0f7ff;border:1px solid #cfe2ff;border-radius:12px;">'
          + '<div style="font-size:14px;font-weight:700;color:#1e3a8a;margin-bottom:6px;">📁 Track everything in your portal</div>'
          + '<div style="font-size:13px;color:#475569;line-height:1.5;margin-bottom:10px;">Get a portal link to view this quote, future quotes, invoices, job history, and photos any time.</div>'
          + '<div id="portal-form" style="display:flex;gap:6px;flex-wrap:wrap;">'
          + '<input id="portal-email" type="email" inputmode="email" placeholder="your@email.com" value="' + esc(q.client_email || '') + '" style="flex:1;min-width:180px;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;">'
          + '<button onclick="sendPortalLink()" id="portal-btn" style="background:#1e3a8a;color:#fff;border:none;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">Send link</button>'
          + '</div>'
          + '<div id="portal-msg" style="font-size:13px;margin-top:8px;display:none;"></div>'
          + '</div>';
      } else if (!isDeclined && !q.deposit_required) {
        var tcConsentText = 'I have reviewed and agree to the scope of work, pricing, and terms described in this ' + docTerm.toLowerCase() + '.'
          + (tcUrl ? ' <a href="' + esc(tcUrl) + '" target="_blank" style="color:#1a3c12;">View Terms &amp; Conditions</a>' : '');
        actionHtml = '<div class="actions">'
          + (noSig
              // ── No-signature mode: direct approve button ──────────────────
              ? '<button class="btn btn-approve" id="btn-approve-main" onclick="confirmApproveNoSig()">✅ Approve This ' + docTerm + '</button>'
              // ── Signature mode (default): signature pad ───────────────────
              : '<button class="btn btn-approve" id="btn-approve-main" onclick="showSignaturePad()">✅ Approve This ' + docTerm + '</button>'
            )
          + '<div class="sig-section" id="sig-section">'
          + '<div class="section-label" style="margin-bottom:8px;">Sign to Approve</div>'
          + '<button type="button" class="sig-toggle" id="sig-toggle-btn" onclick="toggleSigMode()">⌨ Type signature instead</button>'
          + '<div id="sig-draw-wrap">'
          + '<canvas id="sig-canvas" class="sig-canvas" width="700" height="200"></canvas>'
          + '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">'
          + '<div style="font-size:12px;color:#aaa;">Draw your signature above</div>'
          + '<button class="sig-clear" onclick="clearSignature()">✕ Clear</button>'
          + '</div>'
          + '</div>'
          + '<div id="sig-typed-wrap" style="display:none;">'
          + '<input type="text" id="sig-typed" class="sig-typed-input" placeholder="Type your signature" autocomplete="off" aria-label="Type your signature">'
          + '<div style="font-size:12px;color:#aaa;margin-top:4px;">Type your full legal name as your signature</div>'
          + '</div>'
          + '<div style="margin-top:14px;">'
          + '<div class="section-label">Full Name</div>'
          + '<input type="text" id="sig-name" placeholder="Type your full name" style="width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;font-family:inherit;margin-top:4px;">'
          + '</div>'
          + '<label style="display:flex;align-items:flex-start;gap:8px;margin-top:12px;cursor:pointer;">'
          + '<input type="checkbox" id="sig-consent" style="width:18px;height:18px;flex-shrink:0;margin-top:2px;">'
          + '<span style="font-size:12px;color:#666;line-height:1.5;">I consent to signing this document electronically. I acknowledge that my electronic signature has the same legal effect as a handwritten signature under the federal ESIGN Act and ' + esc(BM_CONFIG.state) + ' ESRA. ' + tcConsentText + '</span>'
          + '</label>'
          + '<div style="display:flex;gap:8px;margin-top:12px;">'
          + '<button class="btn btn-approve" style="flex:1;" onclick="confirmApprove()">✅ Confirm &amp; Approve</button>'
          + '<button class="btn" style="padding:10px 16px;background:#f5f5f5;color:#333;border:1px solid #ddd;" onclick="cancelSignature()">Cancel</button>'
          + '</div>'
          + '</div>'
          + '<a href="https://branchmanager.app/onboarding/service-agreement.html?id=' + esc(window._quoteId||quoteId) + '&token=' + esc(urlToken||'') + '" target="_blank" class="btn btn-changes" style="text-decoration:none;display:flex;justify-content:center;">📄 Review &amp; Sign Service Agreement</a>'
          + '<button class="btn btn-changes" onclick="toggleChanges()">💬 Request Changes</button>'
          + '<div class="changes-form" id="changes-form">'
          + '<div class="section-label" style="margin-bottom:8px;">What would you like changed?</div>'
          + '<textarea id="changes-text" rows="4" placeholder="e.g. Please also quote removing the oak in the backyard, and can you include stump grinding?"></textarea>'
          + '<button class="btn btn-approve" style="margin-top:10px;" onclick="submitChanges()">Send Request</button>'
          + '</div>'
          + '<button class="btn btn-decline" onclick="toggleDecline()">❌ Decline This ' + docTerm + '</button>'
          + '<div class="changes-form" id="decline-form">'
          + '<div class="section-label" style="margin-bottom:8px;">Reason — optional</div>'
          + '<textarea id="decline-text" rows="3" placeholder="Let us know why (optional). This helps us improve."></textarea>'
          + '<button class="btn btn-decline" style="margin-top:10px;" onclick="submitDecline()">Confirm Decline</button>'
          + '</div>'
          + '</div>'
          + depositHtml
          + HIC_HTML;
      } else if (!isDeclined) {
        actionHtml = depositHtml
          + '<div style="margin-top:8px;">'

    // Render typed signature to a canvas data URL so storage path is unchanged
    function _typedSigToDataURL(text) {
      var c = document.createElement('canvas');
      c.width = 700; c.height = 200;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.fillStyle = '#1a3c12';
      ctx.font = "italic 96px 'Brush Script MT', 'Lucida Handwriting', cursive";
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.fillText(text, c.width / 2, c.height / 2);
      return c.toDataURL('image/png');
    }

    function showSignaturePad() {
      var sec = el('sig-section');
      var mainBtn = el('btn-approve-main');
      if (!sec) return;
      sec.style.display = 'block';
      if (mainBtn) mainBtn.style.display = 'none';
      // Init canvas after it's visible
      setTimeout(function() {
        var canvas = el('sig-canvas');
        if (!canvas || canvas._inited) return;
        canvas._inited = true;
        var ctx = canvas.getContext('2d');
        ctx.strokeStyle = '#1a3c12';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        function pos(e) {
          var r = canvas.getBoundingClientRect();
          var sx = canvas.width / r.width, sy = canvas.height / r.height;
          var cx = e.touches ? e.touches[0].clientX : e.clientX;
          var cy = e.touches ? e.touches[0].clientY : e.clientY;
          return { x: (cx - r.left) * sx, y: (cy - r.top) * sy };
        }
        canvas.addEventListener('mousedown', function(e) { _sigDrawing = true; ctx.beginPath(); var p = pos(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', function(e) { if (!_sigDrawing) return; var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mouseup', function() { _sigDrawing = false; });
        canvas.addEventListener('mouseleave', function() { _sigDrawing = false; });
        canvas.addEventListener('touchstart', function(e) { e.preventDefault(); _sigDrawing = true; ctx.beginPath(); var p = pos(e); ctx.moveTo(p.x, p.y); }, { passive: false });
        canvas.addEventListener('touchmove', function(e) { e.preventDefault(); if (!_sigDrawing) return; var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
        canvas.addEventListener('touchend', function() { _sigDrawing = false; });
      }, 50);
    }

    function recalcSelected() {

      picks.forEach(function(cb) {

      });
      var taxRate = Number(q.tax_rate || 0);

      var taxEl = document.getElementById('ft-tax');
      var totEl = document.getElementById('ft-total');
      if (sub) sub.textContent = money(subtotal);
      if (taxEl) taxEl.textContent = money(tax);
      if (totEl) totEl.textContent = money(total);
      // Disable approve if zero items selected
      var allUnchecked = Array.from(picks).every(function(cb){ return !cb.checked; });
      var approveBtn = document.getElementById('btn-approve-main');
      if (approveBtn) {
        approveBtn.disabled = allUnchecked;
        approveBtn.style.opacity = allUnchecked ? '0.5' : '1';
        approveBtn.style.cursor = allUnchecked ? 'not-allowed' : 'pointer';
      }
    }
    function gatherSelected() {
      if (!window._allowSelection) return null; // single-item or already-approved
      var q = window._quoteData || {};
      var allItems = q.line_items || [];
      var selected = [];
      var subtotal = 0;
      document.querySelectorAll('.li-pick').forEach(function(cb) {
        if (!cb.checked) return;
        var idx = parseInt(cb.getAttribute('data-idx'), 10);
        var item = allItems[idx];
        if (item) {
          selected.push(item);
          subtotal += parseFloat(cb.getAttribute('data-amt') || '0');
        }
      });
      var taxRate = Number(q.tax_rate || 0);
      var tax = subtotal * (taxRate / 100);
      return {
        line_items: selected,
        subtotal: Number(subtotal.toFixed(2)),
        tax_amount: Number(tax.toFixed(2)),
        total: Number((subtotal + tax).toFixed(2)),
        original_count: allItems.length,
        selected_count: selected.length
      };
    }

            quoteId: window._quoteId,
            quoteNumber: q.quote_number || '',
            clientName: q.client_name || '',
            total: q.total || 0,
            property: q.property || '',
            declineReason: reason,
            clientEmail: q.client_email || ''
          })
        }).catch(function(){});

        el('app').innerHTML = ''
          + '<div class="header" style="border-radius:12px;">'
          + '<div class="header-logo">🌳 ' + esc(BM_CONFIG.companyName) + '</div>'
          + '<h1>Decision Recorded</h1>'
          + '</div>'
          + '<div class="card card-standalone" style="border-radius:0 0 12px 12px;">'
          + '<div class="success-card">'
          + '<div class="success-icon">📝</div>'
          + '<h2>Got it — we\'ve recorded your decision</h2>'
          + '<p>Thanks for letting us know. If anything changes or you\'d like to revisit, just give us a call.</p>'
          + '<p style="margin-top:20px;"><a href="tel:' + BM_CONFIG.phoneDigits + '" style="color:#1a3c12;font-weight:700;text-decoration:none;font-size:16px;">📞 ' + esc(BM_CONFIG.phone) + '</a></p>'
          + '</div>'
          + '</div>'
          + '<div class="footer"><a href="' + esc(BM_CONFIG.websiteUrl) + '">' + esc(BM_CONFIG.website) + '</a></div>';
      } catch(e) {
        alert('Could not record decline. Please call ' + BM_CONFIG.phone + '.');
        if (btn) { btn.textContent = 'Confirm Decline'; btn.disabled = false; }
      }
    }

    function showError(msg) {
      el('app').innerHTML = '<div class="card card-standalone" style="border-radius:12px;margin-top:20px;">'
        + '<div class="error-card">'
        + '<div style="font-size:40px;margin-bottom:16px;">⚠️</div>'
        + '<h2 style="margin-bottom:8px;">Link Not Found</h2>'
        + '<p style="color:#666;" id="err-msg">' + esc(msg).replace(/&lt;br&gt;/g, '<br>') + '</p>'
        + '<p style="margin-top:20px;"><a href="tel:' + BM_CONFIG.phoneDigits + '" style="color:#1a3c12;font-weight:700;text-decoration:none;">📞 ' + BM_CONFIG.phone + '</a></p>'
        + '</div></div>'
        + '<div class="footer"><a href="' + BM_CONFIG.websiteUrl + '">' + BM_CONFIG.website + '</a></div>';
    }

    document.title = 'Quote Approval — ' + BM_CONFIG.companyName;
    window.addEventListener('load', loadQuote);

    function sendPortalLink() {
      var emailInput = document.getElementById('portal-email');
      var btn = document.getElementById('portal-btn');
      var msg = document.getElementById('portal-msg');
      var email = (emailInput.value || '').trim().toLowerCase();
      if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        msg.style.display = 'block';
        msg.style.color = '#b91c1c';
        msg.textContent = 'Please enter a valid email.';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Sending…';
      msg.style.display = 'none';
      fetch(FN_BASE + '/portal-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, body: d }; }); })
        .then(function(res) {
          btn.disabled = false;
          btn.textContent = 'Send link';
          msg.style.display = 'block';
          if (res.ok && res.body.ok) {
            msg.style.color = '#166534';
            msg.textContent = 'If your email is on file with us, you\'ll receive a portal link within a minute. (Check spam if it doesn\'t arrive.)';
            document.getElementById('portal-form').style.display = 'none';
          } else {
            msg.style.color = '#b91c1c';
            msg.textContent = (res.body && res.body.error) || 'Something went wrong. Please try again.';
          }
        })
        .catch(function() {
          btn.disabled = false;
          btn.textContent = 'Send link';
          msg.style.display = 'block';
          msg.style.color = '#b91c1c';
          msg.textContent = 'Network error — please try again.';
        });
    }
    window.sendPortalLink = sendPortalLink;
  </script>
</body>
</html>
